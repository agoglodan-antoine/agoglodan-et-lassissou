<?xml version="1.0" encoding="us-ascii" standalone="no"?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="1206px" preserveAspectRatio="none" style="width:978px;height:1206px;background:#FFFFFF;" version="1.1" viewBox="0 0 978 1206" width="978px" zoomAndPan="magnify"><defs/><g><ellipse cx="168" cy="16" fill="#181818" rx="10" ry="10" style="stroke:none;stroke-width:1.0;"/><g id="en_attente"><rect fill="#F1F1F1" height="50" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="88" x="124" y="87"/><line style="stroke:#181818;stroke-width:0.5;" x1="124" x2="212" y1="114.6094" y2="114.6094"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="68" x="134" y="106.5332">en_attente</text></g><g id="payee"><rect fill="#F1F1F1" height="50" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="59" x="220.5" y="231"/><line style="stroke:#181818;stroke-width:0.5;" x1="220.5" x2="279.5" y1="258.6094" y2="258.6094"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="39" x="230.5" y="250.5332">pay&#233;e</text></g><g id="annulee"><rect fill="#F1F1F1" height="50" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="71" x="103.5" y="516"/><line style="stroke:#181818;stroke-width:0.5;" x1="103.5" x2="174.5" y1="543.6094" y2="543.6094"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="51" x="113.5" y="535.5332">annul&#233;e</text></g><g id="en_cours_de_traitement"><rect fill="#F1F1F1" height="50" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="162" x="240" y="359"/><line style="stroke:#181818;stroke-width:0.5;" x1="240" x2="402" y1="386.6094" y2="386.6094"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="142" x="250" y="378.5332">en cours de traitement</text></g><g id="validee"><rect fill="#F1F1F1" height="50" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="65" x="303.5" y="516"/><line style="stroke:#181818;stroke-width:0.5;" x1="303.5" x2="368.5" y1="543.6094" y2="543.6094"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="45" x="313.5" y="535.5332">valid&#233;e</text></g><g id="refusee"><rect fill="#F1F1F1" height="50" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="68" x="446" y="1036"/><line style="stroke:#181818;stroke-width:0.5;" x1="446" x2="514" y1="1063.6094" y2="1063.6094"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="48" x="456" y="1055.5332">refus&#233;e</text></g><g id="en_cours_de_livraison"><rect fill="#F1F1F1" height="50" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="151" x="262.5" y="689"/><line style="stroke:#181818;stroke-width:0.5;" x1="262.5" x2="413.5" y1="716.6094" y2="716.6094"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="131" x="272.5" y="708.5332">en cours de livraison</text></g><g id="confirmee"><rect fill="#F1F1F1" height="50" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="82" x="88" y="1036"/><line style="stroke:#181818;stroke-width:0.5;" x1="88" x2="170" y1="1063.6094" y2="1063.6094"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="62" x="98" y="1055.5332">confirm&#233;e</text></g><g id="livree"><rect fill="#F1F1F1" height="50" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="54" x="156" y="871"/><line style="stroke:#181818;stroke-width:0.5;" x1="156" x2="210" y1="898.6094" y2="898.6094"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="34" x="166" y="890.5332">livr&#233;e</text></g><ellipse cx="129" cy="1190" fill="none" rx="10" ry="10" style="stroke:#181818;stroke-width:1.0;"/><ellipse cx="129.5" cy="1190.5" fill="#181818" rx="6" ry="6" style="stroke:none;stroke-width:1.0;"/><g id="elem_GMN29"><path d="M404,487 L404,537 L368.62,541 L404,545 L404,595.1094 A0,0 0 0 0 404,595.1094 L652,595.1094 A0,0 0 0 0 652,595.1094 L652,497 L642,487 L404,487 A0,0 0 0 0 404,487 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M642,487 L642,497 L652,497 L642,487 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="214" x="410" y="505.4951">Le mode de retrait (livraison ou retrait</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="227" x="410" y="521.8467">direct) a &#233;t&#233; choisi par l'acheteur d&#232;s la</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="225" x="410" y="538.1982">cr&#233;ation de la commande ; il d&#233;termine</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="222" x="410" y="554.5498">laquelle des trois transitions ci-dessus</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="212" x="410" y="570.9014">s'applique. Plus possible d'annuler la</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="161" x="410" y="587.2529">commande apr&#232;s validation.</text></g><g id="elem_GMN32"><path d="M245,850 L245,892 L210.23,896 L245,900 L245,941.7578 A0,0 0 0 0 245,941.7578 L503,941.7578 A0,0 0 0 0 503,941.7578 L503,860 L493,850 L245,850 A0,0 0 0 0 245,850 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M493,850 L493,860 L503,860 L493,850 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="229" x="251" y="868.4951">Pas possible de refuser une commande</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="208" x="251" y="884.8467">avant livraison ni apr&#232;s confirmation.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="237" x="251" y="901.1982">Cette &#233;tape et la v&#233;rification par QR code</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="219" x="251" y="917.5498">ne concernent que le cas o&#249; un livreur</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="77" x="251" y="933.9014">est intervenu.</text></g><!--link *start* to en_attente--><g id="link_*start*_en_attente"><path d="M168,26.01 C168,38.7 168,62.41 168,81.57 " fill="none" id="*start*-to-en_attente" style="stroke:#181818;stroke-width:1.0;"/><polygon fill="#181818" points="168,86.84,172,77.84,168,81.84,164,77.84,168,86.84" style="stroke:#181818;stroke-width:1.0;"/></g><!--link en_attente to payee--><g id="link_en_attente_payee"><path d="M181.91,137.09 C196.16,161.77 218.33,200.15 233.47,226.37 " fill="none" id="en_attente-to-payee" style="stroke:#181818;stroke-width:1.0;"/><polygon fill="#181818" points="236.02,230.79,234.9826,220.9959,233.5193,226.4603,228.055,224.997,236.02,230.79" style="stroke:#181818;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="158" x="220" y="181.4951">l'acheteur r&#232;gle le paiement</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="107" x="245.5" y="197.8467">(fonds s&#233;questr&#233;s)</text></g><!--link en_attente to annulee--><g id="link_en_attente_annulee"><path d="M166.36,137.18 C161.37,210.64 146.4,431.01 140.98,510.77 " fill="none" id="en_attente-to-annulee" style="stroke:#181818;stroke-width:1.0;"/><polygon fill="#181818" points="140.64,515.82,145.248,507.1156,140.983,510.8318,137.2669,506.5668,140.64,515.82" style="stroke:#181818;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="97" x="156" y="325.4951">l'acheteur annule</text></g><!--link payee to en_cours_de_traitement--><g id="link_payee_en_cours_de_traitement"><path d="M263.69,281.29 C275.43,302.12 292.36,332.17 304.77,354.21 " fill="none" id="payee-to-en_cours_de_traitement" style="stroke:#181818;stroke-width:1.0;"/><polygon fill="#181818" points="307.35,358.78,306.4377,348.9735,304.9048,354.4187,299.4596,352.8858,307.35,358.78" style="stroke:#181818;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="106" x="291" y="325.4951">paiement confirm&#233;</text></g><!--link en_cours_de_traitement to validee--><g id="link_en_cours_de_traitement_validee"><path d="M323.34,409.22 C326,436.63 330.32,481.28 333.16,510.65 " fill="none" id="en_cours_de_traitement-to-validee" style="stroke:#181818;stroke-width:1.0;"/><polygon fill="#181818" points="333.67,515.95,336.8025,506.6126,333.198,510.9723,328.8382,507.3678,333.67,515.95" style="stroke:#181818;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="113" x="329" y="453.4951">le fournisseur valide</text></g><!--link en_cours_de_traitement to refusee--><g id="link_en_cours_de_traitement_refusee"><path d="M402.09,391.7 C551.02,406.26 853,447.23 853,540 C853,540 853,540 853,897 C853,1041.44 615.24,1059.14 519.37,1060.41 " fill="none" id="en_cours_de_traitement-to-refusee" style="stroke:#181818;stroke-width:1.0;"/><polygon fill="#181818" points="514.09,1060.46,523.1351,1064.3569,519.0897,1060.4029,523.0437,1056.3574,514.09,1060.46" style="stroke:#181818;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="116" x="854" y="711.4951">le fournisseur refuse</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="98" x="863" y="727.8467">(remboursement)</text></g><!--link en_cours_de_traitement to annulee--><g id="link_en_cours_de_traitement_annulee"><path d="M266.3,409.11 C250.52,417.39 233.84,427.51 220,439 C194.87,459.86 172.17,489.58 157.24,511.38 " fill="none" id="en_cours_de_traitement-to-annulee" style="stroke:#181818;stroke-width:1.0;"/><polygon fill="#181818" points="154.36,515.63,162.7344,510.4464,157.1762,511.4986,156.1241,505.9404,154.36,515.63" style="stroke:#181818;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="97" x="221" y="453.4951">l'acheteur annule</text></g><!--link validee to en_cours_de_livraison--><g id="link_validee_en_cours_de_livraison"><path d="M334.37,566.21 C333.01,589.88 331.52,626.93 333,659 C333.37,666.95 334.04,675.53 334.77,683.47 " fill="none" id="validee-to-en_cours_de_livraison" style="stroke:#181818;stroke-width:1.0;"/><polygon fill="#181818" points="335.28,688.84,338.415,679.5034,334.8093,683.8622,330.4505,680.2565,335.28,688.84" style="stroke:#181818;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="195" x="334" y="639.4951">l'acheteur avait choisi la livraison ;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="148" x="357.5" y="655.8467">un livreur prend en charge</text></g><!--link validee to confirmee--><g id="link_validee_confirmee"><path d="M303.13,557.86 C243.38,588.78 118.69,663.43 70,769 C28.52,858.92 82.52,977.75 112.05,1031.47 " fill="none" id="validee-to-confirmee" style="stroke:#181818;stroke-width:1.0;"/><polygon fill="#181818" points="114.49,1035.84,113.6158,1026.03,112.0618,1031.4692,106.6226,1029.9152,114.49,1035.84" style="stroke:#181818;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="218" x="72" y="783.4951">l'acheteur avait choisi le retrait direct ;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="220" x="71" y="799.8467">il confirme la r&#233;ception en main propre</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="177" x="92.5" y="816.1982">(sans v&#233;rification par QR code)</text></g><!--link validee to refusee--><g id="link_validee_refusee"><path d="M353.22,566.09 C361.9,576.52 373.28,587.93 386,595 C444.66,627.6 491.52,573.04 534,625 C543.27,636.34 589.24,519.27 521,942 C515.93,973.38 503.23,1007.51 493.29,1030.95 " fill="none" id="validee-to-refusee" style="stroke:#181818;stroke-width:1.0;"/><polygon fill="#181818" points="491.22,1035.79,498.4419,1029.0934,493.1896,1031.1943,491.0887,1025.942,491.22,1035.79" style="stroke:#181818;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="210" x="578" y="791.9951">l'acheteur avait choisi le retrait direct</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="272" x="547" y="808.3467">et signale une non-conformit&#233; (remboursement)</text></g><!--link en_cours_de_livraison to livree--><g id="link_en_cours_de_livraison_livree"><path d="M334.95,739.21 C330.82,762.63 321.33,797.74 300,820 C275.73,845.33 256.08,830.39 227,850 C219.95,854.76 213.12,860.78 207.02,866.86 " fill="none" id="en_cours_de_livraison-to-livree" style="stroke:#181818;stroke-width:1.0;"/><polygon fill="#181818" points="203.33,870.64,212.4862,867.0118,206.8296,867.0689,206.7725,861.4124,203.33,870.64" style="stroke:#181818;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="175" x="329" y="799.9951">le livreur mentionne la livraison</text></g><!--link livree to confirmee--><g id="link_livree_confirmee"><path d="M175.03,921.05 C165.34,950.3 148.99,999.65 138.61,1030.98 " fill="none" id="livree-to-confirmee" style="stroke:#181818;stroke-width:1.0;"/><polygon fill="#181818" points="137,1035.85,143.6276,1028.5648,138.5726,1031.1037,136.0336,1026.0487,137,1035.85" style="stroke:#181818;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="170" x="159" y="986.4951">l'acheteur scanne le QR code</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="135" x="176.5" y="1002.8467">et confirme la r&#233;ception</text></g><!--link livree to refusee--><g id="link_livree_refusee"><path d="M202.04,921.08 C209.15,928.72 217.76,936.58 227,942 C271.08,967.85 291.12,951.66 338,972 C375.76,988.38 415.29,1013.64 443.02,1032.9 " fill="none" id="livree-to-refusee" style="stroke:#181818;stroke-width:1.0;"/><polygon fill="#181818" points="447.37,1035.94,442.2927,1027.5007,443.2745,1033.0717,437.7035,1034.0535,447.37,1035.94" style="stroke:#181818;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="94" x="400" y="986.4951">l'acheteur refuse</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="93" x="400.5" y="1002.8467">(non-conformit&#233;)</text></g><!--link confirmee to *end*--><g id="link_confirmee_*end*"><path d="M129,1086.19 C129,1112.35 129,1153.19 129,1174.68 " fill="none" id="confirmee-to-*end*" style="stroke:#181818;stroke-width:1.0;"/><polygon fill="#181818" points="129,1179.95,133,1170.95,129,1174.95,125,1170.95,129,1179.95" style="stroke:#181818;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="144" x="139.5" y="1130.4951">versement au fournisseur</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="163" x="130" y="1146.8467">(et au livreur le cas &#233;ch&#233;ant)</text></g><!--link annulee to *end*--><g id="link_annulee_*end*"><path d="M103.36,565.8 C63.96,595.28 6,649.44 6,713 C6,713 6,713 6,1062 C6,1124.35 83.44,1167.71 115.43,1182.97 " fill="none" id="annulee-to-*end*" style="stroke:#181818;stroke-width:1.0;"/><polygon fill="#181818" points="120.15,1185.17,113.6872,1177.7382,115.6194,1183.0548,110.3028,1184.9871,120.15,1185.17" style="stroke:#181818;stroke-width:1.0;"/></g><!--link refusee to *end*--><g id="link_refusee_*end*"><path d="M445.94,1081.89 C410.88,1101.63 354.15,1131.53 302,1150 C245.45,1170.03 174.75,1182.17 144.21,1186.82 " fill="none" id="refusee-to-*end*" style="stroke:#181818;stroke-width:1.0;"/><polygon fill="#181818" points="138.99,1187.6,148.4845,1190.218,143.9345,1186.8569,147.2956,1182.3068,138.99,1187.6" style="stroke:#181818;stroke-width:1.0;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="167" x="379" y="1138.4951">remboursement de l'acheteur</text></g><!--SRC=[ZLL1Rjim4Bph5OjS4XTm7f00lVJQGz9hKWICjBO9I4kLf0pqHz4JUjR7Eak9bgmwHW4VQExkpEnmIRry-KdRxLTYUJCniaGkYdcTGgtvpKmFLD-Qyi2HEqz- -DZNJFYrndA3r5Uvspcf0eMX_zLnY7xemsODPKIwUWqsRXR5o3E9ALtdmrl5Rz4R6nC5gZ8RbKvsrZT3dzHUIbQSewbjDT8nxP0aDWIb70FNIZtlkd2fT0oWNS_DknQdciqrhAjTPuthlcjx14fmiYex0fhAWxF1KcreJdjybKxIVyrhFKi5GAGQl-SpcicyVnITGJCwJNrGPJsNKV5jVQfLRXnnoMsq80THOwo0re4PxWGZWOv3x-tEbYRbjCRJymyWLBmvqxFm-d_Ll0f72dOl1g5EcCJ9LhKvtzWuzBG-dkAojqgVB9jEEjkdHT0iVEPnKKovLrmCfKbbd7jDKY_RjeIxQC9fs5RjeP-PNgjVS8qVwCXJlsIwvT02WDDURW_gIXC8GWv3RzIVFACJM97bpE1dXbB52vr54QA9FBqK0Bx1QkZvPjh_v6veeaweXXHm3kN2F2MQcTQVWCu7kiOyHNBPPBdcwN81E3kgmTCBSufdYpIQrejOjajZQPrYXJYDsVqXajlbRWgYxqmDHaC5vhc-ctjmNTv5wZZl6p8uBHtiwKRePLeCIZLy1CmMyakqDDwtAarRwPh62DQFXEiB0oDZXaHLr0OlTLshZ03pWQj78C5gUQ3IRX48NK1gk3LjMrlatzDJtGLgNGZsNMjlHr_yH9_fJEjLK-evwRalz4LIHrQsZ2U2sYUpnCsc-dI_CoxIy39WU6Qxn6QowSmcEg9lZ6-F-cPQp4jKEpvzaf2UQAHaBpgTw3NV4pVyeVbjHIQ-RsJnKVD7bcvkx2y0]--></g></svg>