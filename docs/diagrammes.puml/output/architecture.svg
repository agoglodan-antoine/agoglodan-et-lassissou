<?xml version="1.0" encoding="us-ascii" standalone="no"?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="568px" preserveAspectRatio="none" style="width:832px;height:568px;background:#FFFFFF;" version="1.1" viewBox="0 0 832 568" width="832px" zoomAndPan="magnify"><defs/><g><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="412" x="203" y="24.5332">Architecture logicielle 3-tiers d'ElevConnect (MVC Laravel)</text><!--entity PRES--><g id="elem_PRES"><rect fill="#F1F1F1" height="110.5625" rx="4" ry="4" style="stroke:#181818;stroke-width:0.5;" width="251" x="87.5" y="45.6094"/><text fill="#000000" font-family="Helvetica" font-size="12" lengthAdjust="spacing" textLength="148" x="97.5" y="68.0664">COUCHE PR&#201;SENTATION</text><text fill="#000000" font-family="Helvetica" font-size="12" lengthAdjust="spacing" textLength="100" x="97.5" y="83.1602">Navigateur / Client</text><text fill="#000000" font-family="Helvetica" font-size="12" lengthAdjust="spacing" textLength="3" x="97.5" y="98.2539">&#160;</text><text fill="#000000" font-family="Helvetica" font-size="12" lengthAdjust="spacing" textLength="230" x="97.5" y="113.3477">Vues Blade (HTML5, CSS3, Tailwind CSS,</text><text fill="#000000" font-family="Helvetica" font-size="12" lengthAdjust="spacing" textLength="231" x="97.5" y="128.4414">JavaScript) &#8212; scan de QR code c&#244;t&#233; client</text><text fill="#000000" font-family="Helvetica" font-size="12" lengthAdjust="spacing" textLength="214" x="97.5" y="143.5352">(pas d'int&#233;gration WhatsApp Business)</text></g><!--entity APP--><g id="elem_APP"><rect fill="#F1F1F1" height="155.8438" rx="4" ry="4" style="stroke:#181818;stroke-width:0.5;" width="412" x="7" y="233.6094"/><text fill="#000000" font-family="Helvetica" font-size="12" lengthAdjust="spacing" textLength="186" x="17" y="256.0664">COUCHE M&#201;TIER / APPLICATION</text><text fill="#000000" font-family="Helvetica" font-size="12" lengthAdjust="spacing" textLength="392" x="17" y="271.1602">Serveur Laravel 13 (PHP 8.3.14) sur WampServer (environnement local)</text><text fill="#000000" font-family="Helvetica" font-size="12" lengthAdjust="spacing" textLength="3" x="17" y="286.2539">&#160;</text><text fill="#000000" font-family="Helvetica" font-size="12" lengthAdjust="spacing" textLength="223" x="17" y="301.3477">Routes &#8594; Contr&#244;leurs &#8594; Form Requests</text><text fill="#000000" font-family="Helvetica" font-size="12" lengthAdjust="spacing" textLength="299" x="17" y="316.4414">&#8594; Middlewares (auth, r&#244;le, CSRF) &#8594; Mod&#232;les Eloquent</text><text fill="#000000" font-family="Helvetica" font-size="12" lengthAdjust="spacing" textLength="3" x="17" y="331.5352">&#160;</text><text fill="#000000" font-family="Helvetica" font-size="12" lengthAdjust="spacing" textLength="351" x="17" y="346.6289">Services : notifications, moteur de statuts (annonce, commande,</text><text fill="#000000" font-family="Helvetica" font-size="12" lengthAdjust="spacing" textLength="289" x="17" y="361.7227">livraison), g&#233;n&#233;ration/v&#233;rification QR code, calcul des</text><text fill="#000000" font-family="Helvetica" font-size="12" lengthAdjust="spacing" textLength="281" x="17" y="376.8164">commissions et des versements, t&#226;ches planifi&#233;es</text></g><!--entity DATA--><g id="elem_DATA"><rect fill="#F1F1F1" height="95.4688" rx="4" ry="4" style="stroke:#181818;stroke-width:0.5;" width="208" x="109" y="466.6094"/><text fill="#000000" font-family="Helvetica" font-size="12" lengthAdjust="spacing" textLength="116" x="119" y="489.0664">COUCHE DONN&#201;ES</text><text fill="#000000" font-family="Helvetica" font-size="12" lengthAdjust="spacing" textLength="75" x="119" y="504.1602">SGBD MySQL</text><text fill="#000000" font-family="Helvetica" font-size="12" lengthAdjust="spacing" textLength="3" x="119" y="519.2539">&#160;</text><text fill="#000000" font-family="Helvetica" font-size="12" lengthAdjust="spacing" textLength="160" x="119" y="534.3477">Base de donn&#233;es (22 tables)</text><text fill="#000000" font-family="Helvetica" font-size="12" lengthAdjust="spacing" textLength="188" x="119" y="549.4414">Moteur InnoDB &#8212; charset utf8mb4</text></g><!--entity EXT--><g id="elem_EXT"><rect fill="#F1F1F1" height="65.2813" rx="4" ry="4" style="stroke:#181818;stroke-width:0.5;" width="192" x="634" y="279.1094"/><text fill="#000000" font-family="Helvetica" font-size="12" lengthAdjust="spacing" textLength="127" x="644" y="301.5664">SERVICES EXTERNES</text><text fill="#000000" font-family="Helvetica" font-size="12" lengthAdjust="spacing" textLength="132" x="644" y="316.6602">Passerelle de paiement</text><text fill="#000000" font-family="Helvetica" font-size="12" lengthAdjust="spacing" textLength="172" x="644" y="331.7539">(Mobile Money / Carte bancaire)</text></g><!--link PRES to APP--><g id="link_PRES_APP"><path d="M213,156.6194 C213,178.4694 213,204.1294 213,228.1794 " fill="none" id="PRES-to-APP" style="stroke:#181818;stroke-width:1.0;"/><polygon fill="#181818" points="213,233.2794,217,224.2794,213,228.2794,209,224.2794,213,233.2794" style="stroke:#181818;stroke-width:1.0;"/><text fill="#000000" font-family="Helvetica" font-size="12" lengthAdjust="spacing" textLength="200" x="214" y="200.0664">Requ&#234;tes / r&#233;ponses HTTP (HTTPS)</text></g><!--link APP to DATA--><g id="link_APP_DATA"><path d="M213,389.8394 C213,413.7394 213,439.4794 213,461.2294 " fill="none" id="APP-to-DATA" style="stroke:#181818;stroke-width:1.0;"/><polygon fill="#181818" points="213,466.3794,217,457.3794,213,461.3794,209,457.3794,213,466.3794" style="stroke:#181818;stroke-width:1.0;"/><text fill="#000000" font-family="Helvetica" font-size="12" lengthAdjust="spacing" textLength="240" x="214" y="433.0664">Eloquent ORM (requ&#234;tes SQL param&#233;tr&#233;es)</text></g><!--link APP to EXT--><g id="link_APP_EXT"><path d="M419.19,311.6094 C491.17,311.6094 568.8,311.6094 628.47,311.6094 " fill="none" id="APP-to-EXT" style="stroke:#181818;stroke-width:1.0;"/><polygon fill="#181818" points="633.83,311.6094,624.83,307.6094,628.83,311.6094,624.83,315.6094,633.83,311.6094" style="stroke:#181818;stroke-width:1.0;"/><text fill="#000000" font-family="Helvetica" font-size="12" lengthAdjust="spacing" textLength="160" x="446.5" y="290.0664">Encaissement (s&#233;questre) et</text><text fill="#000000" font-family="Helvetica" font-size="12" lengthAdjust="spacing" textLength="178" x="437.5" y="305.1602">versements (fournisseur, livreur)</text></g><!--SRC=[fLFDRjms4BxlKmpIWoLW7SC_0Om2BR0hozqjhBKYgKuFUnbJt1KHYbH9Ia5wwYc0hq6VeATkpta3lKcUf4EkdMu00pr45qd3-ORpVT_C4Vpm3S_a25B9XqGhnPc3pt_y2JF36k7ehpSSfDuA9hYK7CwFdU36GfJT9N231WSkOy8d3NR2KUx552p1X5QmN2v3hO40_j-AjfDY8yOTfoHK5fZk9UyDuR-fVVjMg8vwQU4UsTkjqRsg4osrWU-kmtEG4GwPDeeRk3o8smPh_KweBMnGMdvmKlCDzj9TQ-LMs79OS3bm9nW-drEAtpcSdXqSjbffrXXDM6TwFfauuKZA_vEuFZeqvMl19uPYgBQK_YAv_ILPf90NuqEPhgfPjRnThTKA1x55H-h22IHISENMQgtkUcvXBh7c42sgxERL59AoF9z2XK8I_Th_JjVgPnomP4PqBWuUMeQAMCBhWaoZDni_kN47xB5mrA5lM2WARWq6-zyqwEoiws3UMw6ujV4BeAoyICld-i_6XsgP5jJjBCzlbiaZZvARmPDuf0wdvn3bYnmkNvw_FBs8mTBP6soxa6SWuceGnclMKcCaAqCPU-A5xXrH__pX8v2apeoV_EJj0zVQj53mtqWRPzVAXp9HrvA_GqEO27lNJ250l5p5THnWcQx7loKbf58JTY-mxqCm2duFIZkQTXRKi5CQW-06YMSTkjxvmaffnQWeqssBgkQal1I3GM6rYgUm7NTgtEtrF1dewqkz9oC8YfBraifIvxwCi7xPB73dOs7vWXRKWHl_OWt5EebgluSsM4A2F-V8rUrgDJwa9P7wQNu5sVlozOsdE4VBFOsQPFOr83ex0uVt90L9dUrfBedQrJpC3ckGUd3GkyrbUtyHhhoQLRElxYpJucwPf2MalrPfiVAtvcWjDs4dwBOEHU11mvRfUq71J2l-tayt6iTfzHL3OVX-ogZAPE973OvfhTNnZvuaUU9T7l_nat12XkuwKeg-5rML-tseyZAU-CGda6-JK4y6mssHGMI-r2118EpukAE98YaUqKPi6qTmwiAZVMDsxm94Tjo5GQDEoQEr-iyWY3QwDygdzcOAVX3e8vxy2m00]--></g></svg>